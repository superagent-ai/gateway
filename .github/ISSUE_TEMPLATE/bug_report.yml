name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe what happened and what you expected.
      placeholder: What went wrong?
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: Client
      description: Which client or front door were you using?
      options:
        - Claude Code / Anthropic Messages
        - Codex / OpenAI Responses
        - Direct curl or custom client
        - Other
    validations:
      required: false

  - type: input
    id: model
    attributes:
      label: Model or Provider
      description: Which configured model alias or upstream provider was involved?
      placeholder: kimi, openrouter/moonshotai/..., anthropic/claude-...
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Output
      description: Include relevant gateway/client logs. Redact tokens and provider keys.
      render: text
    validations:
      required: false
